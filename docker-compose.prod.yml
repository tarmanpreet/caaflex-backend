name: caf

services:
  app:
    image: ${APP_IMAGE:-ghcr.io/tarmanpreet/caaflex-backend:sha-521d7f2}
    container_name: caf_app
    restart: always
    ports:
      - "${APP_PORT:-80}:8080"
    env_file:
      - path: .env
        required: true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
    networks:
      - caf_network

  db:
    image: mysql:8.0
    container_name: caf_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - caf_network

  redis:
    image: redis:alpine
    container_name: caf_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - caf_network

volumes:
  app_storage:
  app_bootstrap_cache:
  db_data:
  redis_data:

networks:
  caf_network:
    driver: bridge
