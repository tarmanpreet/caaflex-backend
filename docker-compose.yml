name: caf

services:
  # ─────────────────────────────────────────────────────────────
  # App — PHP 8.4-FPM + Nginx + Supervisor (single container)
  # ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: caf_app
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - caf_network

  # ─────────────────────────────────────────────────────────────
  # Vite dev server — HMR per asset frontend (solo dev)
  # ─────────────────────────────────────────────────────────────
  vite:
    image: node:lts-alpine
    container_name: caf_vite
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev"
    ports:
      - "${VITE_PORT:-5173}:5173"
    env_file:
      - .env
    volumes:
      - .:/var/www/html
      - /var/www/html/node_modules
    networks:
      - caf_network

  # ─────────────────────────────────────────────────────────────
  # Database — MySQL 8.0
  # ─────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: caf_db
    restart: unless-stopped
    ports:
      - "${DB_EXTERNAL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - caf_network

  # ─────────────────────────────────────────────────────────────
  # Database TEST — MySQL 8.0 (isolato da dev, porta 3307)
  # ─────────────────────────────────────────────────────────────
  db_test:
    image: mysql:8.0
    container_name: caf_db_test
    restart: unless-stopped
    ports:
      - "${DB_TEST_EXTERNAL_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${DB_TEST_DATABASE:-laravel_test}
      MYSQL_USER: ${DB_TEST_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_TEST_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
    volumes:
      - db_test_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - caf_network

  # ─────────────────────────────────────────────────────────────
  # Cache & Queues — Redis
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: caf_redis
    restart: unless-stopped
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - caf_network

volumes:
  db_data:
  db_test_data:
  redis_data:

networks:
  caf_network:
    driver: bridge
